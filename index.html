<!doctype html>

<html>
  <head>
    <title>PlayVault</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="logo.png" />
  </head>

  <body>
    <div class="navbar">
      <a href="index.html" class="logo">PlayVault</a>

      <div class="nav-links" id="nav-links">
        <!-- JS fills -->
      </div>
    </div>
    <div class="hero">
      <h2>Discover PlayStation Games</h2>
      <p class="tagline">
        Explore top-rated titles, hidden gems, and your next favorite adventure
        🎮
      </p>

      <input
        type="text"
        id="search"
        class="search-bar"
        placeholder="Search for a game..."
      />
    </div>

    <div id="loader" class="loader"></div>
    <div id="game-list"></div>
    <div class="pagination">
      <button class="prev-btn" onclick="prevPage()">⬅ Prev</button>
      <button class="next-btn" onclick="nextPage()">Next ➡</button>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <iframe id="video"></iframe>
      </div>
    </div>

    <script src="app.js"></script>
    <div id="toast-container" class="toast-container"></div>
    <footer class="footer">

      <div class="footer-container">
        <!-- LEFT -->
        <div class="footer-section">
          <h2 class="footer-logo">PlayVault</h2>
          <p class="footer-text">
            Discover, rate, and build your ultimate PlayStation game collection.
          </p>
        </div>

        <!-- CENTER -->
        <div class="footer-section center">
          <h4>Follow Us</h4>
          <div class="socials">
            <a href="https://facebook.com" target="_blank">
              <i class="fab fa-facebook-f"></i>
            </a>

            <a href="https://instagram.com" target="_blank">
              <i class="fab fa-instagram"></i>
            </a>

            <a href="https://x.com" target="_blank">
              <i class="fab fa-x-twitter"></i>
            </a>

            <a href="https://discord.com" target="_blank">
              <i class="fab fa-discord"></i>
            </a>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="footer-section right">
          <h4>Explore</h4>
          <a href="about.html">About Us</a>
          <a href="contact.html">Contact</a>
          <a href="privacy.html">Privacy Policy</a>
        </div>
      </div>

      <div class="footer-divider"></div>

      <p class="footer-bottom">© 2026 PlayVault. Built for gamers 🎮</p>
    </footer>
    
  </body>
</html>
